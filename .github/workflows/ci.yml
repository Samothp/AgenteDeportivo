name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Tests – Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Instalar herramientas de calidad
        run: pip install ruff mypy

      - name: Verificar sintaxis de módulos principales
        run: |
          python -m py_compile src/analysis.py
          python -m py_compile src/api.py
          python -m py_compile src/constants.py
          python -m py_compile src/data_loader.py
          python -m py_compile src/player_loader.py
          python -m py_compile src/visualizer.py
          python -m py_compile src/agent.py
          python -m py_compile src/run_agent.py
          python -m py_compile app.py

      - name: Linting (ruff)
        run: ruff check src/ app.py bot.py --select=E,F,W --ignore=E501,E402,E701,E702,E741,F541,F841,E401,W292

      - name: Type checking (mypy)
        run: mypy src/ --ignore-missing-imports --no-error-summary

      - name: Ejecutar tests con coverage
        run: |
          pytest tests/ -v --tb=short --cov=src --cov-report=term-missing
